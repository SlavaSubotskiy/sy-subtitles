<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<title>SY Subtitles</title>
<script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
<script src="https://player.vimeo.com/api/player.js"></script>
<style>
/* --- Theme: CSS custom properties --- */
:root {
  --bg: #1a1a1a; --bg2: #111; --bg3: #222; --bg4: #333; --bg5: #2a2a2a;
  --fg: #fff; --fg2: #eee; --fg3: #ccc; --fg4: #aaa; --fg5: #888; --fg6: #666;
  --border: #333; --border2: #444; --border3: #555;
  --link: #6af; --accent-green: #4ade80; --accent-orange: #ffa500; --accent-red: #f66;
  --overlay-bg: rgba(0,0,0,0.85);
  --stat-active-bg: #1a2a3a; --primary-bg: #2a4a2a; --primary-border: #4a4; --primary-fg: #8f8;
  --issue-bg: #3a2a4a; --issue-border: #84c; --issue-fg: #c8f;
  --danger-bg: #4a2a2a; --danger-border: #a44; --danger-fg: #f88;
  --cell-hover: #222; --cell-edit-bg: #1a2a1a; --cell-edited-bg: #2a2a1a;
}
@media (prefers-color-scheme: light) {
  :root:not([data-theme="dark"]) {
    --bg: #f5f5f5; --bg2: #fff; --bg3: #eee; --bg4: #ddd; --bg5: #e8e8e8;
    --fg: #111; --fg2: #222; --fg3: #444; --fg4: #666; --fg5: #888; --fg6: #aaa;
    --border: #ddd; --border2: #ccc; --border3: #bbb;
    --link: #0066cc; --accent-green: #16a34a; --accent-orange: #d97706; --accent-red: #dc2626;
    --overlay-bg: rgba(0,0,0,0.75);
    --stat-active-bg: #e0f0ff; --primary-bg: #e8f5e8; --primary-border: #4a4; --primary-fg: #166016;
    --issue-bg: #f0e8f5; --issue-border: #84c; --issue-fg: #5a2a7a;
    --danger-bg: #f5e8e8; --danger-border: #a44; --danger-fg: #a01010;
    --cell-hover: #f0f0f0; --cell-edit-bg: #e8f5e8; --cell-edited-bg: #f5f0e0;
  }
}
[data-theme="light"] {
  --bg: #f5f5f5; --bg2: #fff; --bg3: #eee; --bg4: #ddd; --bg5: #e8e8e8;
  --fg: #111; --fg2: #222; --fg3: #444; --fg4: #666; --fg5: #888; --fg6: #aaa;
  --border: #ddd; --border2: #ccc; --border3: #bbb;
  --link: #0066cc; --accent-green: #16a34a; --accent-orange: #d97706; --accent-red: #dc2626;
  --overlay-bg: rgba(0,0,0,0.75);
  --stat-active-bg: #e0f0ff; --primary-bg: #e8f5e8; --primary-border: #4a4; --primary-fg: #166016;
  --issue-bg: #f0e8f5; --issue-border: #84c; --issue-fg: #5a2a7a;
  --danger-bg: #f5e8e8; --danger-border: #a44; --danger-fg: #a01010;
  --cell-hover: #f0f0f0; --cell-edit-bg: #e8f5e8; --cell-edited-bg: #f5f0e0;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--fg); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

/* --- Shared --- */
a { color: var(--link); text-decoration: none; }
a:hover { text-decoration: underline; }
.header { padding: 12px 20px; background: var(--bg2); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
.header h1 { font-size: 16px; font-weight: normal; color: var(--fg4); }
.header-actions { display: flex; gap: 8px; }
.header-actions button { background: var(--bg4); color: var(--fg); border: 1px solid var(--border3); border-radius: 6px; padding: 6px 14px; font-size: 13px; cursor: pointer; }
.header-actions button.primary { background: var(--primary-bg); border-color: var(--primary-border); color: var(--primary-fg); }
.header-actions button.issue { background: var(--issue-bg); border-color: var(--issue-border); color: var(--issue-fg); }
.header-actions button:active { opacity: 0.7; }
button:focus-visible, a:focus-visible { outline: 2px solid var(--link); outline-offset: 2px; }
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--bg4);
  color: var(--fg); padding: 8px 20px; border-radius: 8px; font-size: 14px; z-index: 100;
  opacity: 0; transition: opacity 0.3s; pointer-events: none; }
.toast.show { opacity: 1; }
#status { text-align: center; padding: 16px; color: var(--fg5); }
.view { display: none; }
.view.active { display: block; }

/* --- Index --- */
.talk-item { padding: 14px 16px; border: 1px solid var(--border); border-radius: 8px; max-width: 800px; margin: 8px auto; background: var(--bg2); transition: border-color 0.15s; }
.talk-item:hover { border-color: var(--border2); }
.talk-date { font-size: 12px; color: var(--fg5); font-family: monospace; margin-bottom: 4px; display: flex; align-items: center; justify-content: space-between; }
.talk-title { font-size: 15px; font-weight: 600; color: var(--fg2); margin-bottom: 6px; }
.talk-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; }
.talk-actions a { font-size: 13px; padding: 3px 10px; border-radius: 4px; border: 1px solid var(--border2); color: var(--fg4); text-decoration: none; display: inline-flex; align-items: center; gap: 4px; }
.talk-actions a:hover { border-color: var(--link); color: var(--link); }
.talk-actions a.preview-link { color: var(--link); }
.talk-actions a.review-link { color: var(--issue-fg); }
.talk-videos { display: flex; gap: 6px; flex-wrap: wrap; }
.talk-videos a { font-size: 12px; color: var(--fg5); background: var(--bg3); padding: 2px 8px; border-radius: 4px; text-decoration: none; }
.talk-videos a:hover { color: var(--link); background: var(--stat-active-bg); }
.pending { color: var(--fg6); font-size: 12px; font-style: italic; }
#search-input:focus { border-color: var(--link); outline: none; }
.stats-bar { display: flex; gap: 12px; flex-wrap: wrap; max-width: 800px; margin: 12px auto; padding: 0 20px; }
.stat-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px;
  min-width: 80px; cursor: pointer; transition: border-color 0.15s; }
.stat-card:hover { border-color: var(--fg6); }
.stat-card.active { border-color: var(--link); background: var(--stat-active-bg); }
.stat-card .num { font-size: 22px; font-weight: 600; color: var(--fg); }
.stat-card .label { font-size: 11px; color: var(--fg5); margin-top: 2px; }
.stat-card.good .num { color: var(--accent-green); }
.stat-card.warn .num { color: var(--accent-orange); }
.stat-card.info .num { color: var(--link); }
.review-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px;
  font-weight: 500; margin-left: 8px; text-decoration: none !important; }
.review-badge:hover { opacity: 0.8; }
.review-badge.needs-review { background: var(--issue-bg); color: var(--accent-orange); border: 1px solid var(--border2); }
.review-badge.in-review { background: var(--stat-active-bg); color: var(--link); border: 1px solid var(--border2); }
.review-badge.approved { background: var(--primary-bg); color: var(--accent-green); border: 1px solid var(--primary-border); }

/* --- Preview --- */
.player-container { position: relative; width: 100%; max-width: 960px; margin: 20px auto; }
.video-wrap { position: relative; padding-bottom: 56.25%; height: 0; }
.video-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
#subtitle-overlay {
  position: relative; width: 100%; min-height: 60px; padding: 12px 16px;
  background: var(--overlay-bg); color: #fff; font-size: 40px;
  line-height: 1.4; text-align: center; border-radius: 0 0 4px 4px;
}
#subtitle-overlay:empty { min-height: 20px; }
#subtitle-overlay:empty::after { content: '\200B'; }
.controls { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 8px; }
.controls button { background: var(--bg4); color: var(--fg); border: 1px solid var(--border3); border-radius: 6px;
  padding: 8px 16px; font-size: 14px; cursor: pointer; touch-action: manipulation; }
.controls button:active { background: var(--border3); }
#time-display { color: var(--fg6); font-size: 13px; font-family: monospace; }
.markers { max-width: 960px; margin: 0 auto; padding: 0 8px; }
.markers summary { color: var(--fg5); cursor: pointer; padding: 8px; font-size: 14px; }
.marker-actions { display: flex; gap: 8px; padding: 8px 0; }
.marker-actions button { background: var(--primary-bg); color: var(--primary-fg); border: 1px solid var(--primary-border); border-radius: 6px;
  padding: 6px 14px; font-size: 13px; cursor: pointer; }
.marker-actions button.issue { background: var(--issue-bg); color: var(--issue-fg); border-color: var(--issue-border); }
.marker-actions button.danger { background: var(--danger-bg); color: var(--danger-fg); border-color: var(--danger-border); }
.marker-list { list-style: none; }
.marker-item { padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
.marker-item .tc { color: var(--link); cursor: pointer; font-family: monospace; }
.marker-item .tc:hover { text-decoration: underline; }
.marker-item .text { color: var(--fg3); }
.marker-item .del { color: var(--fg6); cursor: pointer; padding: 0 4px; }
.marker-item .del:hover { color: var(--accent-red); }
.marker-item .comment { width: 100%; background: var(--bg5); color: var(--fg2); border: 1px solid var(--border2);
  border-radius: 4px; padding: 4px 8px; font-size: 13px; margin-top: 4px; }
.marker-item .comment:focus { border-color: var(--link); outline: none; }

/* --- Review --- */
.grid { display: grid; grid-template-columns: 1fr 1fr; max-width: 1400px; margin: 0 auto; }
.col-header { padding: 10px 16px; background: var(--bg3); font-size: 13px; color: var(--fg5); text-transform: uppercase;
  position: sticky; top: 0; z-index: 1; cursor: pointer; position: relative; }
.col-header:hover { color: var(--fg4); }
.transcript-dropdown { position: absolute; top: 100%; left: 0; background: var(--bg3); border: 1px solid var(--border2);
  border-radius: 4px; max-height: 300px; overflow-y: auto; z-index: 50; min-width: 180px; display: none; text-transform: none; }
.transcript-dropdown.open { display: block; }
.transcript-dropdown div { padding: 6px 12px; cursor: pointer; font-size: 13px; color: var(--fg3); }
.transcript-dropdown div:hover { background: var(--bg4); }
.transcript-dropdown div.active { color: var(--accent-green); }
.cell { padding: 10px 16px; border-bottom: 1px solid var(--bg5); font-size: 15px; line-height: 1.5; min-height: 40px; }
.cell.en { color: var(--fg4); }
.cell.uk { color: var(--fg2); cursor: text; }
.cell.uk:hover { background: var(--cell-hover); }
.cell.uk:focus { background: var(--cell-edit-bg); outline: 1px solid var(--primary-border); }
.cell.uk.edited { background: var(--cell-edited-bg); }
.cell.uk.marked { border-left: 3px solid var(--issue-border); }
.counter { position: fixed; bottom: 16px; right: 16px; background: var(--bg3); border: 1px solid var(--border2);
  border-radius: 8px; padding: 8px 14px; font-size: 13px; color: var(--fg5); }
.counter span { color: var(--fg); }
/* --- Branch selector --- */
.branch-selector { position: relative; display: inline-block; }
.branch-btn { background: var(--bg3); color: var(--link); border: 1px solid var(--border2); border-radius: 4px;
  padding: 4px 10px; font-size: 13px; cursor: pointer; font-family: monospace; }
.branch-btn.non-main { border-color: var(--accent-orange); color: var(--accent-orange); }
.branch-dropdown { position: absolute; top: 100%; right: 0; background: var(--bg3); border: 1px solid var(--border2);
  border-radius: 4px; max-height: 300px; overflow-y: auto; z-index: 50; min-width: 200px; display: none; }
.branch-dropdown.open { display: block; }
.branch-dropdown div { padding: 6px 12px; cursor: pointer; font-size: 13px; font-family: monospace; }
.branch-dropdown div:hover { background: var(--bg4); }
.branch-dropdown div.active { color: var(--accent-green); }

@media (max-width: 768px) {
  .grid { grid-template-columns: 1fr; }
  .col-header.en, .cell.en { display: none; }
  #subtitle-overlay { font-size: 24px; min-height: 40px; padding: 8px 12px; }
  .controls button { min-height: 44px; min-width: 44px; }
}
</style>
</head>

  <span id="last-updated"></span>
  <button id="refresh-btn" onclick="SPA.refreshManifest()" style="background:none;color:var(--fg5);border:1px solid var(--border2);border-radius:4px;padding:2px 6px;font-size:11px;cursor:pointer;display:none;" data-i18n-title="title.refresh">&#x21bb;</button>
  <button id="lang-btn" onclick="SPA.toggleLang()" style="background:none;color:var(--fg5);border:1px solid var(--border2);border-radius:4px;padding:2px 6px;font-size:11px;cursor:pointer;" data-i18n-title="title.lang">UK</button>
  <button id="theme-btn" onclick="SPA.cycleTheme()" style="background:none;color:var(--fg5);border:1px solid var(--border2);border-radius:4px;padding:2px 6px;font-size:11px;cursor:pointer;" data-i18n-title="title.theme.auto">&#x263C;</button>

<!-- === PREVIEW VIEW === -->
<div id="view-preview" class="view">

        <button onclick="SPA.copyMarkers()" data-i18n="btn.copy_all">Copy all</button>
        <button class="issue" onclick="SPA.createPreviewIssue()" data-i18n="btn.create_issue">Create issue</button>
        <button class="danger" onclick="SPA.clearMarkers()" data-i18n="btn.clear_all">Clear all</button>

<!-- === REVIEW VIEW === -->
<div id="view-review" class="view">
  <div class="header">
    <h1><a href="#/" data-i18n="nav.back">&larr; Index</a> &middot; <span id="r-title"></span></h1>

      <button class="branch-btn" id="branch-btn-review" onclick="SPA.toggleBranches()">main &#x25BE;</button>
      <div class="branch-dropdown" id="branch-dropdown-review"></div>

      <button onclick="SPA.revertAllEdits()" id="btn-revert-all" style="display:none" data-i18n="btn.revert_all">Revert all</button>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// SRT Parser (from preview_srt_parser.js)
// ============================================================
function timeToMs(t) {
  var parts = t.split(':');
  var secMs = parts[2].split(',');
  return parseInt(parts[0], 10) * 3600000 + parseInt(parts[1], 10) * 60000 +
    parseInt(secMs[0], 10) * 1000 + parseInt(secMs[1], 10);
}
function parseSRT(text) {
  text = text.replace(/^\uFEFF/, '');
  var blocks = text.trim().split(/\n\s*\n/);
  var result = [];
  for (var i = 0; i < blocks.length; i++) {
    var lines = blocks[i].trim().split('\n');
    if (lines.length < 3) continue;
    var match = lines[1].match(/(\d{2}:\d{2}:\d{2},\d{3})\s*-->\s*(\d{2}:\d{2}:\d{2},\d{3})/);
    if (!match) continue;
    result.push({ index: parseInt(lines[0], 10), startMs: timeToMs(match[1]), endMs: timeToMs(match[2]), text: lines.slice(2).join('\n') });
  }
  return result;
}
function findActiveSubtitle(subs, ms) {
  for (var i = 0; i < subs.length; i++) {
    if (ms >= subs[i].startMs && ms < subs[i].endMs) return subs[i];
  }
  return null;
}

// ============================================================
// Config
// ============================================================
var REPO = 'SlavaSubotskiy/sy-subtitles';
function getBranchFromURL() {
  var params = new URLSearchParams(location.search);
  return params.get('branch') || 'main';
}
var BRANCH = getBranchFromURL();
var RAW = 'https://raw.githubusercontent.com/' + REPO + '/' + BRANCH;
var API = 'https://api.github.com/repos/' + REPO;
var PAGES_BASE = location.pathname.replace(/\/[^/]*$/, '');

// ============================================================
// App version — cache auto-invalidates on update
// ============================================================
var APP_VERSION = '11';
var CACHE_KEY = 'sy_tree_cache__' + BRANCH;
(function() {
  var cached = localStorage.getItem('sy_app_version');
  if (cached !== APP_VERSION) {
    localStorage.removeItem('sy_tree_cache');  // clean old key
    localStorage.removeItem(CACHE_KEY);
    localStorage.setItem('sy_app_version', APP_VERSION);
  }
})();

// ============================================================
// Internationalization (i18n)
// ============================================================

    'btn.create_issue': '\u0421\u0442\u0432\u043E\u0440\u0438\u0442\u0438 issue',
    'btn.clear_all': '\u041E\u0447\u0438\u0441\u0442\u0438\u0442\u0438 \u0432\u0441\u0435',
    'btn.revert_all': '\u0421\u043A\u0430\u0441\u0443\u0432\u0430\u0442\u0438 \u0432\u0441\u0435',
    'btn.create_review_issue': '\u0421\u0442\u0432\u043E\u0440\u0438\u0442\u0438 Issue',
    'btn.open_editor': '\u0412\u0456\u0434\u043A\u0440\u0438\u0442\u0438 \u0432 GitHub Editor',

var LANG_KEY = 'sy_lang';

function detectLang() {
  var saved = localStorage.getItem(LANG_KEY);
  if (saved === 'uk' || saved === 'en') return saved;
  var nav = (navigator.language || navigator.userLanguage || '').toLowerCase();
  return nav.startsWith('uk') ? 'uk' : 'en';
}

var currentLang = detectLang();

function t(key) {
  var dict = I18N[currentLang] || I18N['en'];
  return dict[key] !== undefined ? dict[key] : (I18N['en'][key] !== undefined ? I18N['en'][key] : key);
}

function translatePage() {
  document.querySelectorAll('[data-i18n]').forEach(function(el) {
    var key = el.getAttribute('data-i18n');
    el.textContent = t(key);
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(function(el) {
    el.placeholder = t(el.getAttribute('data-i18n-placeholder'));
  });
  document.querySelectorAll('[data-i18n-title]').forEach(function(el) {
    el.title = t(el.getAttribute('data-i18n-title'));
  });
  // Update html lang attribute
  document.documentElement.lang = currentLang;
}

var SPA = {};

// --- Subtitle language switching ---
function loadSubtitleLang(lang) {
  var s = previewState;
  if (!s) return Promise.resolve();
  var shaKey = s.videoSlug + '/' + lang;
  var sha = (s.talk && s.talk._srtSha && s.talk._srtSha[shaKey]) || '';
  var url = RAW + '/talks/' + s.talkId + '/' + s.videoSlug + '/final/' + lang + '.srt' + (sha ? '?v=' + sha.substring(0, 8) : '');
  s.srtLang = lang;
  return fetch(url)
    .then(function(r) { return r.ok ? r.text() : Promise.reject('SRT fetch failed: HTTP ' + r.status); })
    .then(function(text) {
      s.subtitles = parseSRT(text);
      console.log('[SPA] SRT loaded (' + lang + '):', s.subtitles.length, 'blocks');
    })
    .catch(function(err) {
      console.warn('[SPA] SRT error:', err);
      document.getElementById('subtitle-overlay').textContent = t('error.srt');
    });
}

SPA.switchSubLang = function(lang) {
  loadSubtitleLang(lang).then(function() {
    document.getElementById('subtitle-overlay').textContent = '';
  });
};

function ensureManifest() {
  if (manifest) return Promise.resolve(manifest);
  return loadManifest().then(function(m) { manifest = m; updateLastModifiedUI(); return m; });
}

function route() {
  var hash = location.hash.slice(1) || '/';
  document.querySelectorAll('.view').forEach(function(v) { v.classList.remove('active'); });

  if (hash.startsWith('/preview/')) {
    var parts = hash.split('/'); // ['', 'preview', talk_id, video_slug]
    document.getElementById('view-preview').classList.add('active');
    ensureManifest().then(function() {
      showPreview(parts[2], parts[3]);
    }).catch(function() {
      showPreview(parts[2], parts[3]); // Still try without manifest
    });
  } else if (hash.startsWith('/review/')) {
    var reviewId = hash.split('/')[2].split('?')[0];
    document.getElementById('view-review').classList.add('active');
    ensureManifest().then(function() {
      showReview(reviewId);
    }).catch(function() {
      showReview(reviewId);
    });
  } else {
    showIndex();
  }
}

// ============================================================
// Manifest (talks discovery via Trees API)
// ============================================================
function loadManifest() {
  var cache = null;
  try { cache = JSON.parse(localStorage.getItem(CACHE_KEY)); } catch(e) {}

  var headers = {};
  if (cache && cache.etag) headers['If-None-Match'] = cache.etag;

  return fetch(API + '/git/trees/' + BRANCH + '?recursive=1', { headers: headers })
    .then(function(r) {
      if (r.status === 304 && cache) {
        // On 304, Last-Modified header is still returned
        var lm304 = r.headers.get('Last-Modified');
        if (lm304) cache.lastModified = lm304;
        return cache;
      }
      if (!r.ok) throw 'API ' + r.status;
      var etag = r.headers.get('ETag');
      var lastMod = r.headers.get('Last-Modified');
      return r.json().then(function(data) {
        var m = buildManifest(data.tree);
        m.etag = etag;
        m.lastModified = lastMod || '';
        m.timestamp = Date.now();
        localStorage.setItem(CACHE_KEY, JSON.stringify(m));
        return m;
      });
    })
    .then(function(m) {
      // Fetch meta.yaml for talks that aren't cached yet
      var fetches = [];
      m.talks.forEach(function(t) {
        if (!t.title) {
          fetches.push(
            fetch(RAW + '/talks/' + t.id + '/meta.yaml')
              .then(function(r) { return r.ok ? r.text() : ''; })
              .then(function(text) {
                if (!text) return;
                try {
                  var meta = jsyaml.load(text);
                  t.title = meta.title || t.id;
                  t.date = String(meta.date || t.id.substring(0, 10));
                  t.amrutaUrl = meta.amruta_url || '';
                  t.videos = (meta.videos || []).map(function(v) {
                    return { slug: v.slug, title: v.title || v.slug, vimeo_url: v.vimeo_url || '' };
                  });
                  // Mark which videos have SRT
                  var srtSet = Array.isArray(t._srtSlugs) ? t._srtSlugs : [];
                  t.videos.forEach(function(v) {
                    v.hasSrt = srtSet.indexOf(v.slug) !== -1;
                  });
                } catch(e) { console.warn('YAML parse error for ' + t.id, e); }
              })
          );
        }
      });
      return Promise.all(fetches).then(function() {
        // Always sync hasSrt from _srtSlugs (covers both fresh and cached)
        m.talks.forEach(function(t) {
          var srtSet = Array.isArray(t._srtSlugs) ? t._srtSlugs : [];
          (t.videos || []).forEach(function(v) {
            v.hasSrt = srtSet.indexOf(v.slug) !== -1;
          });
        });
        localStorage.setItem(CACHE_KEY, JSON.stringify(m));
        return m;
      });
    });
}

function buildManifest(tree) {
  var talks = {};
  // Pass 1: create all talks from meta.yaml
  tree.forEach(function(entry) {
    var m = entry.path.match(/^talks\/([^/]+)\/meta\.yaml$/);
    if (m) {
      var tid = m[1];
      if (!talks[tid]) talks[tid] = { id: tid, title: '', date: '', videos: [], hasEn: false, hasUk: false, _srtSlugs: [], _srtSha: {}, _srtLangs: {}, _transcriptSha: {}, transcripts: [] };
    }
  });
  // Pass 2: fill in transcripts and SRT
  tree.forEach(function(entry) {
    var m;
    m = entry.path.match(/^talks\/([^/]+)\/transcript_en\.txt$/);
    if (m && talks[m[1]]) talks[m[1]].hasEn = true;
    m = entry.path.match(/^talks\/([^/]+)\/transcript_uk\.txt$/);
    if (m && talks[m[1]]) talks[m[1]].hasUk = true;
    m = entry.path.match(/^talks\/([^/]+)\/transcript_([a-z][a-z_]*)\.txt$/);
    if (m && talks[m[1]]) {
      if (talks[m[1]].transcripts.indexOf(m[2]) === -1) talks[m[1]].transcripts.push(m[2]);
      talks[m[1]]._transcriptSha[m[2]] = entry.sha || '';
    }
    m = entry.path.match(/^talks\/([^/]+)\/([^/]+)\/final\/([a-z]{2})\.srt$/);
    if (m && talks[m[1]]) {
      var srtSlug = m[2], srtLang = m[3];
      if (talks[m[1]]._srtSlugs.indexOf(srtSlug) === -1) talks[m[1]]._srtSlugs.push(srtSlug);
      // Store sha per slug+lang key
      talks[m[1]]._srtSha[srtSlug + '/' + srtLang] = entry.sha || '';
      // Store available subtitle languages per slug
      if (!talks[m[1]]._srtLangs) talks[m[1]]._srtLangs = {};
      if (!talks[m[1]]._srtLangs[srtSlug]) talks[m[1]]._srtLangs[srtSlug] = [];
      if (talks[m[1]]._srtLangs[srtSlug].indexOf(srtLang) === -1) talks[m[1]]._srtLangs[srtSlug].push(srtLang);
    }
  });

  var result = [];
  for (var tid in talks) {
    var t = talks[tid];
    // _srtSlugs already an array
    result.push(t);
  }
  result.sort(function(a, b) { return a.id < b.id ? -1 : 1; });

  // Extract review-status.json sha for cache-busting
  var reviewSha = '';
  tree.forEach(function(entry) {
    if (entry.path === 'review-status.json') reviewSha = entry.sha || '';
  });

  return { talks: result, _reviewSha: reviewSha };
}

// ============================================================
// Review Status (static JSON, zero API cost)
// ============================================================
function computeStats(talks, statuses, query) {
  var total = { talks: 0, translated: 0, with_srt: 0, approved: 0, pending: 0 };
  var filtered = { talks: 0, translated: 0, with_srt: 0, approved: 0, pending: 0 };
  talks.forEach(function(t) {
    var matchesSearch = !query || ((t.title || '') + ' ' + (t.date || '') + ' ' + t.id).toLowerCase().indexOf(query) !== -1;
    var hasSrt = (t.videos || []).some(function(v) { return v.hasSrt; });
    var st = statuses[t.id];
    var isApproved = st && st.status === 'approved';
    var isPending = st && !isApproved;
    // Total counts
    total.talks++;
    if (t.hasUk) total.translated++;
    if (hasSrt) total.with_srt++;
    if (isApproved) total.approved++;
    if (isPending) total.pending++;
    // Filtered counts (by search)
    if (matchesSearch) {
      filtered.talks++;
      if (t.hasUk) filtered.translated++;
      if (hasSrt) filtered.with_srt++;
      if (isApproved) filtered.approved++;
      if (isPending) filtered.pending++;
    }
  });
  return { total: total, filtered: filtered };
}

function renderStats() {
  var bar = document.getElementById('stats-bar');
  if (!manifest) { bar.style.display = 'none'; return; }
  var statuses = (reviewStatus && reviewStatus.talks) || {};
  var query = (document.getElementById('search-input').value || '').toLowerCase();
  var s = computeStats(manifest.talks, statuses, query);
  var hasSearch = query.length > 0;
  var cards = [
    { f: s.filtered.talks, t: s.total.talks, label: t('stat.all'), cls: 'info', filter: 'all' },
    { f: s.filtered.translated, t: s.total.translated, label: t('stat.translated'), cls: 'info', filter: 'translated' },
    { f: s.filtered.with_srt, t: s.total.with_srt, label: t('stat.with_srt'), cls: 'info', filter: 'with-srt' },
    { f: s.filtered.approved, t: s.total.approved, label: t('stat.approved'), cls: 'good', filter: 'approved' },
    { f: s.filtered.pending, t: s.total.pending, label: t('stat.needs_review'), cls: 'warn', filter: 'needs-review' },
  ];
  bar.innerHTML = '';
  cards.forEach(function(c) {
    var active = activeFilter === c.filter ? ' active' : '';
    var num = hasSearch ? c.f + '<span style="font-size:12px;color:#666">/' + c.t + '</span>' : '' + c.t;
    bar.innerHTML += '<div class="stat-card ' + c.cls + active + '" data-filter="' + c.filter + '" onclick="SPA.filterTalks(\'' + c.filter + '\')">' +
      '<div class="num">' + num + '</div><div class="label">' + c.label + '</div></div>';
  });
  bar.style.display = 'flex';
}

function loadReviewStatus() {
  var sha = (manifest && manifest._reviewSha) || '';
  var url = RAW + '/review-status.json' + (sha ? '?v=' + sha.substring(0, 8) : '');
  return fetch(url)
    .then(function(r) { return r.ok ? r.json() : { talks: {} }; })
    .then(function(data) { reviewStatus = data; return data; })
    .catch(function() { reviewStatus = { talks: {} }; return reviewStatus; });
}

function showIndex() {
  document.getElementById('view-index').classList.add('active');
  document.title = 'SY Subtitles — Index';
  var statusEl = document.getElementById('index-status');
  var contentEl = document.getElementById('index-content');

  if (manifest && reviewStatus) { updateLastModifiedUI(); renderStats(); renderIndex(contentEl); statusEl.style.display = 'none'; return; }

  statusEl.textContent = t('index.loading');
  statusEl.style.display = 'block';

  Promise.all([
    manifest ? Promise.resolve(manifest) : loadManifest().then(function(m) { manifest = m; updateLastModifiedUI(); return m; }),
    reviewStatus ? Promise.resolve(reviewStatus) : loadReviewStatus()
  ]).then(function() {
    renderStats();
    renderIndex(contentEl);
    statusEl.style.display = 'none';
  }).catch(function(err) {
    statusEl.textContent = 'Error: ' + err;
    statusEl.style.color = '#f66';
  });
}

var activeFilter = 'all';

function renderIndex(el) {
  el.innerHTML = '';
  document.getElementById('index-toolbar').style.display = 'block';
  var statuses = (reviewStatus && reviewStatus.talks) || {};
  var query = (document.getElementById('search-input').value || '').toLowerCase();

  manifest.talks.forEach(function(tk) {
    var st = statuses[tk.id] || null;
    var hasSrt = (tk.videos || []).some(function(v) { return v.hasSrt; });

    // Filter
    if (activeFilter === 'translated' && !tk.hasUk) return;
    if (activeFilter === 'with-srt' && !hasSrt) return;
    if (activeFilter === 'approved' && (!st || st.status !== 'approved')) return;
    if (activeFilter === 'needs-review' && (!st || st.status === 'approved')) return;

    // Search
    var searchText = ((tk.title || '') + ' ' + (tk.date || '') + ' ' + tk.id).toLowerCase();
    if (query && searchText.indexOf(query) === -1) return;

    // Build card — all data is from trusted manifest, escaped with esc()
    var div = document.createElement('div');
    div.className = 'talk-item';
    var dateStr = tk.date || tk.id.substring(0, 10);
    var badge = '';
    if (st) {
      var bc = st.status === 'approved' ? 'approved' : st.status === 'in-progress' ? 'in-review' : 'needs-review';
      var bt = st.status === 'approved' ? t('badge.approved') : st.status === 'in-progress' ? t('badge.in_review') + (st.reviewer ? ' (' + esc(st.reviewer) + ')' : '') : t('badge.needs_review');
      var href = st.issue_number ? 'https://github.com/' + REPO + '/issues/' + st.issue_number : '#';
      badge = '<a href="' + href + '" target="_blank" class="review-badge ' + bc + '">' + bt + '</a>';
    }
    var videoLinks = '';
    (tk.videos || []).forEach(function(v) {
      if (v.hasSrt && v.vimeo_url) {
        videoLinks += '<a href="#/preview/' + tk.id + '/' + v.slug + '" class="preview-link">&#x25B6; ' + esc(v.title) + '</a>';
      }
    });
    var reviewLink = '';
    if (tk.hasEn && tk.hasUk) {
      reviewLink = '<a href="#/review/' + tk.id + '" class="review-link">&#x270E; ' + t('link.review') + '</a>';
    }
    var pendingLabel = (!videoLinks && !tk.hasUk) ? '<div class="pending">' + t('badge.pending') + '</div>' : '';
    // Assemble card (all values are escaped or from trusted i18n)
    var dateHtml = tk.amrutaUrl
      ? '<a href="' + tk.amrutaUrl + '" target="_blank" title="' + t('link.amruta') + '" style="color:var(--fg5);text-decoration:none;">' + dateStr + ' &#x2197;</a>'
      : dateStr;
    div.innerHTML = '<div class="talk-date"><span>' + dateHtml + '</span>' + badge + '</div>'
      + '<div class="talk-title">' + esc(tk.title || tk.id) + '</div>'
      + (videoLinks || reviewLink ? '<div class="talk-actions">' + videoLinks + reviewLink + '</div>' : '')
      + pendingLabel;
    el.appendChild(div);
  });
}

SPA.filterTalks = function(filter) {
  activeFilter = (activeFilter === filter && filter !== 'all') ? 'all' : filter;
  document.querySelectorAll('.stat-card').forEach(function(c) {
    c.classList.toggle('active', c.dataset.filter === activeFilter);
  });
  renderIndex(document.getElementById('index-content'));
};

document.addEventListener('DOMContentLoaded', function() {
  var searchEl = document.getElementById('search-input');
  if (searchEl) {
    var debounce;
    searchEl.addEventListener('input', function() {
      clearTimeout(debounce);
      debounce = setTimeout(function() { renderStats(); renderIndex(document.getElementById('index-content')); }, 200);
    });
  }
});

// ============================================================
// PREVIEW VIEW
// ============================================================
var previewState = {};

function showPreview(talkId, videoSlug) {
  document.getElementById('view-preview').classList.add('active');

  // Find talk info
  var talk = manifest ? manifest.talks.find(function(t) { return t.id === talkId; }) : null;
  var video = talk ? (talk.videos || []).find(function(v) { return v.slug === videoSlug; }) : null;

  document.getElementById('p-title').textContent = (talk ? talk.title : talkId) + ' — ' + (video ? video.title : videoSlug);
  document.title = (video ? video.title : videoSlug) + ' – Preview';

  // Setup player
  var iframe = document.getElementById('vimeo-player');
  var embedUrl = video ? vimeoEmbed(video.vimeo_url) : '';
  if (embedUrl && iframe.src !== embedUrl + '&texttrack=false') {
    iframe.src = embedUrl + '&texttrack=false';
  }

  // Determine available subtitle languages
  var availLangs = (talk && talk._srtLangs && talk._srtLangs[videoSlug]) || ['uk'];
  var defaultLang = availLangs.indexOf('uk') !== -1 ? 'uk' : availLangs[0];

  previewState = { talkId: talkId, videoSlug: videoSlug, talk: talk, video: video, subtitles: [], markers: [], currentTime: 0, lastText: '', srtLang: defaultLang };

  // Render subtitle language selector
  var langSel = document.getElementById('srt-lang-select');
  if (langSel) {
    if (availLangs.length > 1) {
      langSel.innerHTML = availLangs.map(function(l) {
        return '<option value="' + l + '"' + (l === defaultLang ? ' selected' : '') + '>' + l.toUpperCase() + '</option>';
      }).join('');
      langSel.style.display = 'inline-block';
      langSel.onchange = function() { SPA.switchSubLang(langSel.value); };
    } else {
      langSel.style.display = 'none';
    }
  }

  // Load markers from localStorage
  var mkey = 'markers_preview_' + talkId + '_' + videoSlug;
  try { previewState.markers = JSON.parse(localStorage.getItem(mkey) || '[]'); } catch(e) {}
  renderMarkers();

  // Load SRT
  var srtLoaded = loadSubtitleLang(defaultLang);

  // Setup player events — wait for both player ready and SRT
  if (embedUrl) {
    try {
      var player = new Vimeo.Player(iframe);
      previewState.player = player;
      player.ready().then(function() {
        console.log('[SPA] Vimeo player ready');
        player.on('timeupdate', function(data) {
          previewState.currentTime = data.seconds;
          var ms = Math.round(data.seconds * 1000);
          var active = findActiveSubtitle(previewState.subtitles, ms);
          var text = active ? active.text : '';
          if (text !== previewState.lastText) {
            document.getElementById('subtitle-overlay').textContent = text;
            previewState.lastText = text;
          }
          var s = Math.floor(data.seconds);
          document.getElementById('time-display').textContent =
            String(Math.floor(s/3600)).padStart(2,'0') + ':' + String(Math.floor((s%3600)/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
        });
      }).catch(function(err) {
        console.warn('[SPA] Vimeo player error:', err);
      });
    } catch(e) {
      console.warn('[SPA] Vimeo Player init error:', e);
    }
  } else {
    console.warn('[SPA] No embed URL — video info not available');
  }
}

function vimeoEmbed(url) {
  var m = url.match(/vimeo\.com\/(\d+)\/([a-f0-9]+)/);
  return m ? 'https://player.vimeo.com/video/' + m[1] + '?h=' + m[2] : url;
}

// --- Markers ---
SPA.addMarker = function() {
  var t = previewState.currentTime;
  var text = previewState.lastText || '(no subtitle)';
  previewState.markers.push({ time: t, tc: fmtTime(t), text: text, comment: '' });
  if (previewState.player) previewState.player.pause();
  saveMarkers();
  renderMarkers();
  var inputs = document.querySelectorAll('.marker-item .comment');
  if (inputs.length) inputs[inputs.length - 1].focus();
};

SPA.removeMarker = function(i) { previewState.markers.splice(i, 1); saveMarkers(); renderMarkers(); };
SPA.updateMarkerComment = function(i, val) { previewState.markers[i].comment = val; saveMarkers(); };
SPA.seekTo = function(sec) { if (previewState.player) previewState.player.setCurrentTime(sec); };
SPA.seek = function(delta) {
  if (!previewState.player) return;
  var t = Math.max(0, previewState.currentTime + delta);
  previewState.player.setCurrentTime(t);
};
SPA.togglePlay = function() {
  if (!previewState.player) return;
  previewState.player.getPaused().then(function(paused) {
    if (paused) previewState.player.play(); else previewState.player.pause();
  });
};
SPA.resumePlayer = function() {
  if (previewState.player) previewState.player.play();
  // Blur input so document keydown handler catches arrow keys
  if (document.activeElement) document.activeElement.blur();
};

function saveMarkers() {
  var key = 'markers_preview_' + previewState.talkId + '_' + previewState.videoSlug;
  localStorage.setItem(key, JSON.stringify(previewState.markers));
}

function renderMarkers() {
  var list = document.getElementById('marker-list');
  var count = document.getElementById('marker-count');
  count.textContent = previewState.markers.length;
  list.innerHTML = '';
  previewState.markers.forEach(function(m, i) {
    var li = document.createElement('li');
    li.className = 'marker-item';
    var c = (m.comment || '').replace(/"/g, '&quot;').replace(/</g, '&lt;');
    li.innerHTML = '<div style="display:flex;align-items:center;gap:8px;width:100%">' +
      '<span class="tc" onclick="SPA.seekTo(' + m.time + ')">' + m.tc + '</span>' +
      '<span class="text">' + esc(m.text) + '</span></div>' +
      '<div style="display:flex;align-items:center;gap:4px">' +
      '<input class="comment" type="text" placeholder="comment..." value="' + c + '" ' +
      'onchange="SPA.updateMarkerComment(' + i + ', this.value)" ' +
      'onkeydown="if(event.key==\'Enter\'){this.blur();SPA.resumePlayer();}">' +
      '<span class="del" onclick="SPA.removeMarker(' + i + ')">&#x2715;</span></div>';
    list.appendChild(li);
  });
}

SPA.clearMarkers = function() {
  if (!previewState.markers.length) return;
  if (!confirm(t('confirm.clear_markers').replace('{n}', previewState.markers.length))) return;
  previewState.markers = [];
  saveMarkers();
  renderMarkers();
  showToast(t('toast.markers_cleared'));
};

SPA.copyMarkers = function() {
  var lines = ['# ' + document.title, ''];
  previewState.markers.forEach(function(m) {
    var line = '- **' + m.tc + '** ' + m.text;
    if (m.comment) line += ' — _' + m.comment + '_';
    lines.push(line);
  });
  navigator.clipboard.writeText(lines.join('\n')).then(function() { showToast(t('toast.copied_markers').replace('{n}', previewState.markers.length)); });
};

SPA.createPreviewIssue = function() {
  var s = previewState;
  var gh = 'https://github.com/' + REPO;
  var lines = [
    '## ' + (s.talk ? s.talk.title : s.talkId) + ' — ' + (s.video ? s.video.title : s.videoSlug),
    '', '| | |', '|---|---|',
    '| SRT | [`talks/' + s.talkId + '/' + s.videoSlug + '/final/uk.srt`](' + gh + '/blob/main/talks/' + s.talkId + '/' + s.videoSlug + '/final/uk.srt) |',
    '| Transcript | [`talks/' + s.talkId + '/transcript_uk.txt`](' + gh + '/blob/main/talks/' + s.talkId + '/transcript_uk.txt) |',
    '', '### Markers', '', '| Time | Subtitle | Comment |', '|------|----------|---------|'
  ];
  previewState.markers.forEach(function(m) { lines.push('| ' + m.tc + ' | ' + m.text + ' | ' + (m.comment || '') + ' |'); });
  var title = encodeURIComponent('Subtitle review: ' + (s.video ? s.video.title : s.videoSlug));
  var body = encodeURIComponent(lines.join('\n'));
  window.open(gh + '/issues/new?title=' + title + '&body=' + body + '&labels=review');
};

document.addEventListener('keydown', function(e) {
  if (!document.getElementById('view-preview').classList.contains('active')) return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'm' || e.key === 'M') { SPA.addMarker(); return; }
  if (e.key === 'ArrowLeft') { e.preventDefault(); SPA.seek(-5); return; }
  if (e.key === 'ArrowRight') { e.preventDefault(); SPA.seek(5); return; }
  if (e.key === ' ') { e.preventDefault(); SPA.togglePlay(); return; }
});

// ============================================================
// REVIEW VIEW
// ============================================================
var LANG_NAMES = {
  en: 'English', uk: 'Ukrainian', hi: 'Hindi',
  hi_corrected: 'Hindi (corrected)', hi_corrected_whisperx: 'Hindi (WhisperX)'
};
function langName(code) { return LANG_NAMES[code] || code.charAt(0).toUpperCase() + code.slice(1); }

var reviewState = { talkId: '', leftLang: 'en', rightLang: 'uk', leftParas: [], rightParas: [], marks: {}, edits: {}, rightHeader: '', rightSep: '\n' };

function parseReviewLangs(hash) {
  var left = 'en', right = 'uk';
  var qm = hash.indexOf('?');
  if (qm !== -1) {
    var params = new URLSearchParams(hash.slice(qm));
    if (params.get('left')) left = params.get('left');
    if (params.get('right')) right = params.get('right');
  }
  return { left: left, right: right };
}

function updateColHeaders() {
  var lh = document.getElementById('col-header-left');
  var rh = document.getElementById('col-header-right');
  if (lh) lh.firstChild.textContent = langName(reviewState.leftLang) + ' \u25BE';
  if (rh) rh.firstChild.textContent = langName(reviewState.rightLang) + ' \u25BE';
}

function showReview(talkId) {
  document.getElementById('view-review').classList.add('active');
  reviewState.talkId = talkId;

  var langs = parseReviewLangs(location.hash);
  reviewState.leftLang = langs.left;
  reviewState.rightLang = langs.right;

  var talk = manifest ? manifest.talks.find(function(t) { return t.id === talkId; }) : null;
  reviewState.talk = talk;
  document.getElementById('r-title').textContent = talk ? talk.title : talkId;
  document.title = 'Review: ' + (talk ? talk.title : talkId);

  // Load state from localStorage
  var skey = 'review_' + talkId;
  try { var s = JSON.parse(localStorage.getItem(skey) || '{}'); reviewState.marks = s.marks || {}; reviewState.edits = s.edits || {}; } catch(e) {}

  updateColHeaders();

  var statusEl = document.getElementById('review-status');
  statusEl.textContent = t('review.loading');
  statusEl.style.display = 'block';

  var leftSha = (talk && talk._transcriptSha && talk._transcriptSha[reviewState.leftLang]) || '';
  var rightSha = (talk && talk._transcriptSha && talk._transcriptSha[reviewState.rightLang]) || '';
  var leftUrl = RAW + '/talks/' + talkId + '/transcript_' + reviewState.leftLang + '.txt' + (leftSha ? '?v=' + leftSha.substring(0, 8) : '');
  var rightUrl = RAW + '/talks/' + talkId + '/transcript_' + reviewState.rightLang + '.txt' + (rightSha ? '?v=' + rightSha.substring(0, 8) : '');

  Promise.all([
    fetch(leftUrl).then(function(r) { return r.ok ? r.text() : ''; }),
    fetch(rightUrl).then(function(r) { return r.ok ? r.text() : ''; })
  ]).then(function(texts) {
    var left = parseTranscript(texts[0]);
    var right = parseTranscript(texts[1]);
    reviewState.leftParas = left.paragraphs;
    reviewState.rightParas = right.paragraphs;
    reviewState.rightHeader = right.header;
    reviewState.rightSep = right.separator;
    renderReview();
    statusEl.style.display = 'none';
  }).catch(function(err) {
    statusEl.textContent = 'Error: ' + err;
    statusEl.style.color = '#f66';
  });
}

function parseTranscript(text) {
  var lines = text.split('\n');
  var bodyStart = 0;
  var header = '';
  for (var i = 0; i < Math.min(lines.length, 10); i++) {
    if (/^(Talk Language:|Language:|Мова промови:|Мова:|भाषण भाषा:)/i.test(lines[i].trim())) {
      bodyStart = i + 1; header = lines.slice(0, bodyStart).join('\n'); break;
    }
  }
  var body = lines.slice(bodyStart).join('\n');
  var useDouble = /\n\s*\n/.test(body);
  var paras = useDouble ? body.split(/\n\s*\n/) : body.split('\n');
  paras = paras.map(function(p) { return p.trim(); }).filter(Boolean);
  return { header: header, separator: useDouble ? '\n\n' : '\n', paragraphs: paras };
}

function renderReview() {
  var grid = document.getElementById('review-grid');
  // Clear old rows (keep headers)
  while (grid.children.length > 2) grid.removeChild(grid.lastChild);

  var n = Math.max(reviewState.leftParas.length, reviewState.rightParas.length);
  for (var i = 0; i < n; i++) {
    var left = reviewState.leftParas[i] || '';
    var right = reviewState.rightParas[i] || '';
    var edited = reviewState.edits[i] !== undefined;
    var marked = reviewState.marks[i] !== undefined;
    var displayRight = edited ? reviewState.edits[i] : right;

    var leftDiv = document.createElement('div');
    leftDiv.className = 'cell en';
    leftDiv.innerHTML = '<div style="color:#555;font-size:11px;margin-bottom:2px">P' + (i+1) + '</div>' + esc(left);

    var rightDiv = document.createElement('div');
    rightDiv.className = 'cell uk' + (edited ? ' edited' : '') + (marked ? ' marked' : '');
    rightDiv.contentEditable = 'true';
    rightDiv.dataset.idx = i;
    rightDiv.innerHTML = '<div style="color:#555;font-size:11px;margin-bottom:2px">P' + (i+1) + '</div>' + esc(displayRight);
    rightDiv.addEventListener('input', (function(idx) { return function() { onReviewEdit(idx, this); }; })(i));

    grid.appendChild(leftDiv);
    grid.appendChild(rightDiv);
  }
  updateReviewCounter();
}

function onReviewEdit(idx, el) {
  var text = el.innerText.replace(/^P\d+\n/, '').trim();
  var orig = reviewState.rightParas[idx] || '';
  if (text === orig) { delete reviewState.edits[idx]; el.classList.remove('edited'); }
  else { reviewState.edits[idx] = text; el.classList.add('edited'); }
  saveReview();
}

function saveReview() {
  localStorage.setItem('review_' + reviewState.talkId, JSON.stringify({ marks: reviewState.marks, edits: reviewState.edits }));
  updateReviewCounter();
}

SPA.revertEdit = function(idx) {
  delete reviewState.edits[idx];
  var cell = document.querySelector('.cell.uk[data-idx="' + idx + '"]');
  if (cell) {
    cell.innerHTML = '<div style="color:#555;font-size:11px;margin-bottom:2px">P' + (idx+1) + '</div>' + esc(reviewState.rightParas[idx] || '');
    cell.classList.remove('edited');
  }
  saveReview();
  showToast(t('toast.reverted').replace('{n}', idx+1));
};

SPA.revertAllEdits = function() {
  if (!Object.keys(reviewState.edits).length) return;
  reviewState.edits = {};
  saveReview();
  renderReview();
  showToast(t('toast.all_reverted'));
};

function updateReviewCounter() {
  var mc = Object.keys(reviewState.marks).length;
  var ec = Object.keys(reviewState.edits).length;
  document.getElementById('mark-count').textContent = mc;
  document.getElementById('edit-count').textContent = ec;
  document.getElementById('review-counter').style.display = (mc + ec > 0) ? 'block' : 'none';
  document.getElementById('btn-revert-all').style.display = ec > 0 ? 'inline-block' : 'none';
}

document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'm' && document.getElementById('view-review').classList.contains('active')) {
    e.preventDefault();
    var el = document.activeElement;
    if (el && el.classList.contains('uk')) {
      var idx = parseInt(el.dataset.idx);
      if (reviewState.marks[idx] !== undefined) delete reviewState.marks[idx];
      else reviewState.marks[idx] = '';
      el.classList.toggle('marked');
      saveReview();
    }
  }
});

SPA.createReviewIssue = function() {
  var gh = 'https://github.com/' + REPO;
  var talk = manifest ? manifest.talks.find(function(t) { return t.id === reviewState.talkId; }) : null;
  var title = talk ? talk.title : reviewState.talkId;
  var lines = [
    '## Translation review: ' + title, '',
    '| | |', '|---|---|',
    '| Transcript | [`talks/' + reviewState.talkId + '/transcript_uk.txt`](' + gh + '/blob/main/talks/' + reviewState.talkId + '/transcript_uk.txt) |', ''
  ];
  var markIdxs = Object.keys(reviewState.marks).map(Number).sort(function(a,b){return a-b;});
  if (markIdxs.length) {
    lines.push('### Marked paragraphs', '', '| P# | English | Ukrainian | Comment |', '|----|---------|-----------|---------|');
    markIdxs.forEach(function(idx) {
      lines.push('| P' + (idx+1) + ' | ' + (reviewState.leftParas[idx]||'') + ' | ' + (reviewState.edits[idx]||reviewState.rightParas[idx]||'') + ' | ' + (reviewState.marks[idx]||'') + ' |');
    });
  }
  var editIdxs = Object.keys(reviewState.edits).map(Number).sort(function(a,b){return a-b;});
  if (editIdxs.length) {
    lines.push('', '### Suggested edits', '');
    editIdxs.forEach(function(idx) {
      lines.push('<details><summary><b>P' + (idx+1) + '</b></summary>', '', '**Before:**', '> ' + (reviewState.rightParas[idx]||''), '', '**After:**', '> ' + reviewState.edits[idx], '', '</details>', '');
    });
  }
  var t = encodeURIComponent('Translation review: ' + title);
  var b = encodeURIComponent(lines.join('\n'));
  window.open(gh + '/issues/new?title=' + t + '&body=' + b + '&labels=review');
};

SPA.openEditor = function() {
  var url = 'https://github.com/' + REPO + '/edit/main/talks/' + reviewState.talkId + '/transcript_' + reviewState.rightLang + '.txt';
  if (Object.keys(reviewState.edits).length > 0) {
    var paras = [];
    for (var i = 0; i < reviewState.rightParas.length; i++) {
      paras.push(reviewState.edits[i] !== undefined ? reviewState.edits[i] : reviewState.rightParas[i]);
    }
    var full = reviewState.rightHeader ? reviewState.rightHeader + reviewState.rightSep + paras.join(reviewState.rightSep) + '\n' : paras.join(reviewState.rightSep) + '\n';
    navigator.clipboard.writeText(full).then(function() {
      alert(t('editor.clipboard_alert'));
      window.open(url);
    });
  } else {
    window.open(url);
  }
};

// ============================================================
// Helpers
// ============================================================
function esc(s) { return (s||'').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 2000);
}
function fmtTime(sec) {
  return String(Math.floor(sec/3600)).padStart(2,'0') + ':' + String(Math.floor((sec%3600)/60)).padStart(2,'0') + ':' + String(Math.floor(sec%60)).padStart(2,'0');
}

// ============================================================
// Transcript Language Selector
// ============================================================
SPA.toggleTranscriptDropdown = function(side) {
  // Close all transcript dropdowns first
  document.querySelectorAll('.transcript-dropdown.open').forEach(function(d) { d.classList.remove('open'); });
  var dd = document.getElementById('transcript-dropdown-' + side);
  if (!dd) return;
  var talk = reviewState.talk;
  var langs = (talk && talk.transcripts) || [];
  if (!langs.length) { showToast(t('no_transcripts')); return; }
  var current = side === 'left' ? reviewState.leftLang : reviewState.rightLang;
  dd.innerHTML = '';
  langs.sort().forEach(function(lang) {
    var d = document.createElement('div');
    d.textContent = langName(lang);
    if (lang === current) d.classList.add('active');
    d.onclick = function(e) { e.stopPropagation(); SPA.switchTranscript(side, lang); };
    dd.appendChild(d);
  });
  dd.classList.add('open');
};

SPA.switchTranscript = function(side, lang) {
  var current = side === 'left' ? reviewState.leftLang : reviewState.rightLang;
  if (lang === current) { document.querySelectorAll('.transcript-dropdown.open').forEach(function(d) { d.classList.remove('open'); }); return; }
  if (Object.keys(reviewState.edits).length > 0) {
    if (!confirm(t('confirm.unsaved_edits'))) return;
    reviewState.edits = {};
    reviewState.marks = {};
    saveReview();
  }
  document.querySelectorAll('.transcript-dropdown.open').forEach(function(d) { d.classList.remove('open'); });
  var left = side === 'left' ? lang : reviewState.leftLang;
  var right = side === 'right' ? lang : reviewState.rightLang;
  var base = '#/review/' + reviewState.talkId;
  if (left !== 'en' || right !== 'uk') base += '?left=' + left + '&right=' + right;
  location.hash = base;
};

document.addEventListener('click', function(e) {
  if (!e.target.closest('.col-header')) {
    document.querySelectorAll('.transcript-dropdown.open').forEach(function(d) { d.classList.remove('open'); });
  }
});

// ============================================================
// Branch Selector
// ============================================================
(function() {
  document.querySelectorAll('.branch-btn').forEach(function(btn) {
    btn.textContent = BRANCH + ' \u25BE';
    if (BRANCH !== 'main') btn.classList.add('non-main');
  });
})();

// ============================================================
// Last-updated indicator + refresh
// ============================================================
function updateLastModifiedUI() {
  var el = document.getElementById('last-updated');
  var btn = document.getElementById('refresh-btn');
  if (!el || !manifest) return;
  btn.style.display = 'inline-block';
  el.style.color = 'var(--fg6)';
  if (manifest.lastModified) {
    var d = new Date(manifest.lastModified);
    var now = new Date();
    var diffMs = now - d;
    var diffMin = Math.floor(diffMs / 60000);
    var label;
    if (diffMin < 1) label = t('freshness.just_now');
    else if (diffMin < 60) label = diffMin + ' ' + t('freshness.min_ago');
    else if (diffMin < 1440) label = Math.floor(diffMin / 60) + ' ' + t('freshness.hour_ago');
    else label = d.toLocaleDateString(currentLang === 'uk' ? 'uk-UA' : 'en-US', { day: 'numeric', month: 'short' });
    el.textContent = t('freshness.updated') + ': ' + label;
    el.title = d.toLocaleString(currentLang === 'uk' ? 'uk-UA' : 'en-US');
  } else {
    el.textContent = '';
  }
}

SPA.refreshManifest = function() {
  var el = document.getElementById('last-updated');
  var oldEtag = manifest ? manifest.etag : null;
  if (el) { el.textContent = t('freshness.refreshing'); el.style.color = 'var(--link)'; }
  // Clear ETag to force fresh manifest fetch
  var cache = null;
  try { cache = JSON.parse(localStorage.getItem(CACHE_KEY)); } catch(e) {}
  if (cache) { delete cache.etag; localStorage.setItem(CACHE_KEY, JSON.stringify(cache)); }
  // Refresh manifest + review status + re-render
  Promise.all([
    loadManifest().then(function(m) { manifest = m; return m; }),
    loadReviewStatus()
  ]).then(function(results) {
    var m = results[0];
    route();
    var changed = m.etag !== oldEtag;
    if (el) {
      el.textContent = changed ? t('freshness.refreshed') : t('freshness.up_to_date');
      el.style.color = 'var(--accent-green)';
    }
    setTimeout(function() { updateLastModifiedUI(); }, 3000);
  }).catch(function(err) {
    if (el) { el.textContent = t('freshness.error') + ' ' + err; el.style.color = 'var(--accent-red)'; }
    setTimeout(function() { updateLastModifiedUI(); }, 5000);
    console.warn('Refresh failed:', err);
  });
};

SPA.toggleBranches = function() {
  // Close all other dropdowns first
  document.querySelectorAll('.branch-dropdown.open').forEach(function(d) { d.classList.remove('open'); });
  // Find the dropdown sibling of the active view's button
  var activeView = document.querySelector('.view.active') || document.getElementById('view-index');
  var dd = activeView.querySelector('.branch-dropdown');
  if (!dd) return;
  dd.innerHTML = '<div style="color:#888;padding:8px 12px">Loading...</div>';
  dd.classList.add('open');
  fetch(API + '/branches?per_page=100')
    .then(function(r) { return r.ok ? r.json() : Promise.reject('HTTP ' + r.status); })
    .then(function(data) {
      dd.innerHTML = '';
      data.forEach(function(b) {
        var d = document.createElement('div');
        d.textContent = b.name;
        if (b.name === BRANCH) d.classList.add('active');
        d.onclick = function() { SPA.switchBranch(b.name); };
        dd.appendChild(d);
      });
    })
    .catch(function(err) {
      dd.innerHTML = '<div style="color:#f66;padding:8px 12px">Error: ' + err + '</div>';
    });
};

SPA.switchBranch = function(name) {
  var url = new URL(location.href);
  if (name === 'main') url.searchParams.delete('branch');
  else url.searchParams.set('branch', name);
  location.href = url.toString();
};

document.addEventListener('click', function(e) {
  if (!e.target.classList.contains('branch-btn')) {
    document.querySelectorAll('.branch-dropdown.open').forEach(function(dd) {
      if (!dd.contains(e.target)) dd.classList.remove('open');
    });
  }
});

// ============================================================
// Theme: auto / dark / light
// ============================================================
(function() {
  var THEME_KEY = 'sy_theme';
  var saved = localStorage.getItem(THEME_KEY); // 'dark', 'light', or null (auto)
  if (saved) document.documentElement.setAttribute('data-theme', saved);

  var icons = { auto: '\u263C', dark: '\u263E', light: '\u2600' };
  var cycle = ['auto', 'dark', 'light'];

  function getCurrent() { return localStorage.getItem(THEME_KEY) || 'auto'; }

  function applyTheme(mode) {
    if (mode === 'auto') {
      document.documentElement.removeAttribute('data-theme');
      localStorage.removeItem(THEME_KEY);
    } else {
      document.documentElement.setAttribute('data-theme', mode);
      localStorage.setItem(THEME_KEY, mode);
    }
    var btn = document.getElementById('theme-btn');
    if (btn) { btn.textContent = icons[mode]; btn.title = t('title.theme.' + mode); }
  }

  SPA.cycleTheme = function() {
    var cur = getCurrent();
    var next = cycle[(cycle.indexOf(cur) + 1) % cycle.length];
    applyTheme(next);
  };

  // Init button label
  var initMode = getCurrent();
  var btn = document.getElementById('theme-btn');
  if (btn) { btn.textContent = icons[initMode]; btn.title = t('title.theme.' + initMode); }
})();

// ============================================================
// Language toggle: uk ↔ en
// ============================================================
SPA.toggleLang = function() {
  currentLang = currentLang === 'uk' ? 'en' : 'uk';
  localStorage.setItem(LANG_KEY, currentLang);
  var btn = document.getElementById('lang-btn');
  if (btn) btn.textContent = currentLang.toUpperCase();
  translatePage();
  // Re-render dynamic content
  if (manifest) {
    updateLastModifiedUI();
    renderStats();
    renderIndex(document.getElementById('index-content'));
  }
  // Update theme button title
  var themeMode = localStorage.getItem('sy_theme') || 'auto';
  var themeBtn = document.getElementById('theme-btn');
  if (themeBtn) themeBtn.title = t('title.theme.' + themeMode);
};

// Initial i18n setup
(function() {
  var btn = document.getElementById('lang-btn');
  if (btn) btn.textContent = currentLang.toUpperCase();
  translatePage();
})();

// Service Worker registration (skip on localhost for dev/test)
// Pass APP_VERSION so SW uses same version for CACHE_NAME
if ('serviceWorker' in navigator && location.hostname !== '127.0.0.1' && location.hostname !== 'localhost') {
  navigator.serviceWorker.register('sw.js?v=' + APP_VERSION).catch(function() {});
}
