name: Sync Review Status

on:
  issues:
    types: [labeled, unlabeled, assigned, unassigned, closed, reopened]
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'issues' ||
      contains(join(github.event.issue.labels.*.name, ','), 'review:')
    steps:
      - uses: actions/checkout@v4

      - name: Auto-update labels on assign/unassign/close/reopen
        if: >
          github.event_name == 'issues' && (
            github.event.action == 'assigned' ||
            github.event.action == 'unassigned' ||
            github.event.action == 'closed' ||
            github.event.action == 'reopened'
          )
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE: ${{ github.event.issue.number }}
          ACTION: ${{ github.event.action }}
        run: |
          if [ "$ACTION" = "assigned" ]; then
            gh issue edit "$ISSUE" --remove-label "review:pending" --add-label "review:in-progress"
          elif [ "$ACTION" = "unassigned" ]; then
            ASSIGNEES=$(gh issue view "$ISSUE" --json assignees --jq '.assignees | length')
            if [ "$ASSIGNEES" = "0" ]; then
              gh issue edit "$ISSUE" --remove-label "review:in-progress" --add-label "review:pending"
            fi
          elif [ "$ACTION" = "closed" ]; then
            gh issue edit "$ISSUE" --remove-label "review:pending,review:in-progress" --add-label "review:approved"
          elif [ "$ACTION" = "reopened" ]; then
            gh issue edit "$ISSUE" --remove-label "review:approved" --add-label "review:pending"
          fi

      - name: Generate review-status.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/sync-review-status.py

      - name: Commit via PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: .github/scripts/bot-pr.sh bot/review-status "Update review status" review-status.json