name: Subtitle Pipeline
run-name: "${{ inputs.talk_id || 'auto' }} | ${{ inputs.whisper != false && 'whisper' || '' }}${{ inputs.translate != false && ' translate' || '' }}${{ inputs.review != false && ' review' || '' }}${{ inputs.build != false && ' build' || '' }}${{ inputs.preview != false && ' preview' || '' }}${{ inputs.timing_source == 'en-srt' && ' (en-srt)' || '' }}"

on:
  push:
    branches: [main]
    paths:
      # - 'talks/*/transcript_en.txt'  # temporarily disabled while re-downloading transcripts
      - 'talks/*/transcript_en.txt.DISABLED'
  workflow_dispatch:
    inputs:
      talk_id:
        description: 'Talk directory name (e.g., 1993-09-19_Ganesha-Puja-Cabella)'
        required: true
        type: string
      whisper:
        description: 'Run whisper step'
        type: boolean
        default: true
      translate:
        description: 'Run translate step'
        type: boolean
        default: true
      review:
        description: 'Run review step'
        type: boolean
        default: true
      build:
        description: 'Run build step (subtitle builder agent)'
        type: boolean
        default: true
      timing_source:
        description: 'Timing source for builder: whisper (default) or en-srt (for non-English talks)'
        type: choice
        options:
          - whisper
          - en-srt
        default: whisper
      preview:
        description: 'Deploy subtitle preview to GitHub Pages'
        type: boolean
        default: true

permissions:
  contents: write
  id-token: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.find.outputs.matrix }}
      talk_matrix: ${{ steps.find.outputs.talk_matrix }}
      whisper_matrix: ${{ steps.find.outputs.whisper_matrix }}
      needs_whisper: ${{ steps.find.outputs.needs_whisper }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Find talks, videos, and pending whisper
        id: find
        run: |
          python3 << 'PYEOF'
          import json, os, subprocess, yaml

          talk_id_input = "${{ inputs.talk_id }}".strip()
          video_includes = []
          talk_ids = set()
          whisper_talk_ids = set()

          def process_talk(talk_id):
              meta_path = f"talks/{talk_id}/meta.yaml"
              if not os.path.isfile(meta_path):
                  print(f"SKIP: {meta_path} not found")
                  return
              talk_ids.add(talk_id)
              with open(meta_path) as f:
                  meta = yaml.safe_load(f)
              for v in meta.get("videos", []):
                  slug = v["slug"]
                  video_includes.append({"talk_id": talk_id, "video_slug": slug})
                  whisper_path = f"talks/{talk_id}/{slug}/source/whisper.json"
                  if not os.path.isfile(whisper_path):
                      whisper_talk_ids.add(talk_id)
                      print(f"WHISPER NEEDED: {talk_id}/{slug}")
                  else:
                      print(f"READY: {talk_id}/{slug}")

          if talk_id_input:
              process_talk(talk_id_input)
          else:
              result = subprocess.run(
                  ["git", "diff", "--name-only", "HEAD~1", "HEAD"],
                  capture_output=True, text=True
              )
              for line in result.stdout.strip().split("\n"):
                  if "transcript_en.txt" in line:
                      parts = line.split("/")
                      if len(parts) >= 2:
                          process_talk(parts[1])

          matrix = json.dumps({"include": video_includes})
          talk_matrix = json.dumps({"include": [{"talk_id": t} for t in sorted(talk_ids)]})
          whisper_matrix = json.dumps({"include": [{"talk_id": t} for t in sorted(whisper_talk_ids)]})
          needs_whisper = "true" if whisper_talk_ids else "false"

          print(f"\nTalks: {len(talk_ids)}, Videos: {len(video_includes)}, Talks needing whisper: {len(whisper_talk_ids)}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={matrix}\n")
              f.write(f"talk_matrix={talk_matrix}\n")
              f.write(f"whisper_matrix={whisper_matrix}\n")
              f.write(f"needs_whisper={needs_whisper}\n")
          PYEOF

  # Run Whisper for talks that don't have whisper.json yet
  whisper:
    needs: discover
    if: inputs.whisper != false && needs.discover.outputs.needs_whisper == 'true'
    strategy:
      matrix: ${{ fromJson(needs.discover.outputs.whisper_matrix) }}
      fail-fast: false
    uses: ./.github/workflows/whisper.yml
    with:
      talk_id: ${{ matrix.talk_id }}

  # Translate EN→UK and review with 2+1 process (per talk)
  translate-and-review:
    needs: discover
    if: inputs.translate != false || inputs.review != false
    environment: main
    strategy:
      matrix: ${{ fromJson(needs.discover.outputs.talk_matrix) }}
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Claude Code
        uses: actions/cache@v5
        with:
          path: |
            ~/.claude-code
            ~/.local/share/claude-code
          key: claude-code-${{ runner.os }}

      - name: Install Claude Code
        run: bun install -g @anthropic-ai/claude-code@latest

      - name: Resolve executable paths
        id: tools
        run: |
          echo "bun=$(which bun)" >> "$GITHUB_OUTPUT"
          echo "claude=$(which claude)" >> "$GITHUB_OUTPUT"

      - name: Translate to Ukrainian
        if: inputs.translate != false
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          path_to_bun_executable: ${{ steps.tools.outputs.bun }}
          path_to_claude_code_executable: ${{ steps.tools.outputs.claude }}
          claude_args: "--max-turns 80 --dangerously-skip-permissions --model claude-opus-4-6"
          show_full_output: true
          prompt: |
            You are translating a Sahaja Yoga lecture from English to Ukrainian.

            REQUIRED READING – read these files before translating:
            1. glossary/CLAUDE.md – transliteration conventions, capitalization rules
            2. glossary/terms_lookup.yaml – EN→UK term dictionary (374 terms)
            3. glossary/terms_context.yaml – disambiguation context for ambiguous terms
            4. glossary/chakra_map.yaml – chakra/deity/channel mapping
            5. talks/${{ matrix.talk_id }}/transcript_en.txt – English source transcript
            (CLAUDE.md is auto-loaded – no need to read it)

            TASK:
            Translate the full English transcript into Ukrainian and write it to:
              talks/${{ matrix.talk_id }}/transcript_uk.txt

            RULES:
            - Translate the header lines too (date, title, location, language line)
            - Header format: translate date to Ukrainian, translate title and location, last header line must start with "Мова промови:"
              Example: "Talk Language: English | Transcript (English) – VERIFIED"
                     → "Мова промови: англійська | Транскрипт (українська)"
            - Separate header from body with one blank line
            - Preserve paragraph structure: one EN paragraph = one UK paragraph
            - One paragraph per line (single \n between paragraphs)
            - Follow ALL language rules from CLAUDE.md
            - Use glossary terms consistently (terms_lookup.yaml + terms_context.yaml)
            - Follow transliteration conventions from glossary/CLAUDE.md (ґ not г for Sanskrit g, дх for dh, і for short i)
            - Translate with devotion, precision, and respect for the sacred meaning

            READING STRATEGY:
            Read the entire transcript_en.txt in ONE Read call (do not use sed/head/tail to read in pieces).
            Read all glossary files in parallel in one turn.

            WRITING STRATEGY (important – the transcript is too large for a single Write):
            Write the translation in LARGE chunks of ~15-20 KB each using bash:
            ```bash
            # First chunk – create file (aim for ~20-30 paragraphs per chunk)
            cat > talks/${{ matrix.talk_id }}/transcript_uk.txt << 'UKEOF'
            Перший абзац...
            ...багато абзаців...
            UKEOF

            # Next chunks – APPEND
            cat >> talks/${{ matrix.talk_id }}/transcript_uk.txt << 'UKEOF'
            Наступний абзац...
            ...багато абзаців...
            UKEOF
            ```
            Use 3-5 chunks TOTAL for the whole file. Do NOT write small chunks of 5-10 lines.
            Do not summarize, abbreviate, or skip any paragraphs.
            After writing, verify paragraph count matches EN (grep -c '^.' on both files).
            If counts differ – you MUST fix the translation before finishing.
            Every EN paragraph must correspond to exactly one UK paragraph, in the same order.
            Do not merge multiple EN paragraphs into one UK paragraph.
            Do not split one EN paragraph into multiple UK paragraphs.
            Do not use TodoWrite – this runs in CI, no one sees progress updates.

      - name: Verify translation
        run: |
          TALK="talks/${{ matrix.talk_id }}"
          UK="$TALK/transcript_uk.txt"
          EN="$TALK/transcript_en.txt"

          if [ ! -f "$UK" ]; then
            echo "::error::transcript_uk.txt was not created by translate step"
            exit 1
          fi

          EN_COUNT=$(python3 -c "
          from tools.align_uk import load_transcript
          print(len(load_transcript('$EN')))
          ")
          UK_COUNT=$(python3 -c "
          from tools.align_uk import load_transcript
          print(len(load_transcript('$UK')))
          ")

          echo "EN paragraphs: $EN_COUNT"
          echo "UK paragraphs: $UK_COUNT"
          echo "UK file size: $(wc -c < "$UK") bytes"

          if [ "$EN_COUNT" != "$UK_COUNT" ]; then
            echo "::error::Paragraph count mismatch! EN=$EN_COUNT UK=$UK_COUNT. Translator must preserve 1:1 paragraph mapping."
            exit 1
          fi

          echo "Paragraph counts match: $EN_COUNT"

      - name: Review translation (2+1)
        if: inputs.review != false
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          path_to_bun_executable: ${{ steps.tools.outputs.bun }}
          path_to_claude_code_executable: ${{ steps.tools.outputs.claude }}
          claude_args: "--max-turns 60 --dangerously-skip-permissions --model claude-opus-4-6"
          show_full_output: true
          prompt: |
            Perform a 2+1 language review on the Ukrainian translation.

            READ these files:
            1. talks/${{ matrix.talk_id }}/transcript_uk.txt – the translation to review
            2. talks/${{ matrix.talk_id }}/transcript_en.txt – English original for reference
            3. templates/language_review_template.md – review process and table format
            4. glossary/CLAUDE.md – SY terminology and capitalization rules
            5. glossary/terms_lookup.yaml – term dictionary
            6. glossary/terms_context.yaml – disambiguation context
            (CLAUDE.md is auto-loaded – no need to read it)

            PROCESS (follow templates/language_review_template.md):

            Step 1 – Reviewer L (Language):
            Check orthography, grammar, punctuation:
            - Spelling, incorrect word forms, mixed Latin/Cyrillic characters
            - Comma usage, quotation marks «», em-dash ` – `, ellipsis `...`
            - Case forms, verb conjugations, gender agreement
            - Missing/extra spaces around punctuation

            Step 2 – Reviewer S (SY Domain):
            Check terminology and capitalization:
            - Deity pronoun capitalization per CLAUDE.md rules
            - Glossary term consistency against terms_lookup.yaml
            - SY terminology accuracy
            - Language names lowercase in Ukrainian
            - Spiritual term capitalization (Дхарма, Інкарнація, Пуджа, Дух, Істина, Стопи)

            Step 3 – Critic:
            Review ALL corrections from L and S:
            - Remove false positives (where original was correct)
            - Remove trivial style preferences (not real errors)
            - Keep only genuine errors with clear justification
            - Resolve conflicts between L and S suggestions

            Step 4 – Apply:
            Apply all Critic-approved corrections to talks/${{ matrix.talk_id }}/transcript_uk.txt
            Save the full review report (with all tables) to talks/${{ matrix.talk_id }}/review_report.md

            Be thorough but precise. Only change what genuinely needs correction.
            Do not use TodoWrite – this runs in CI, no one sees progress updates.

      - name: Upload translation artifacts
        if: "!cancelled()"
        uses: actions/upload-artifact@v6
        with:
          name: translation__${{ matrix.talk_id }}
          if-no-files-found: warn
          path: |
            talks/${{ matrix.talk_id }}/transcript_uk.txt
            talks/${{ matrix.talk_id }}/review_report.md

  # --- Build subtitles: 3-phase pipeline (prepare → matrix chunks → assemble) ---

  # Phase 1: Split text, compute boundaries, write chunk prompt files
  prepare-build:
    needs: [discover, whisper, translate-and-review]
    if: |
      always() &&
      !cancelled() &&
      inputs.build != false &&
      needs.discover.result == 'success' &&
      (needs.translate-and-review.result == 'success' || needs.translate-and-review.result == 'skipped') &&
      (needs.whisper.result == 'success' || needs.whisper.result == 'skipped')
    runs-on: ubuntu-latest
    outputs:
      chunk_matrix: ${{ steps.prepare.outputs.chunk_matrix }}
      talk_id: ${{ steps.prepare.outputs.talk_id }}
      video_slug: ${{ steps.prepare.outputs.video_slug }}
    steps:
      - uses: actions/checkout@v5
      - run: git pull --rebase

      - name: Download translation artifacts
        if: needs.translate-and-review.result == 'success'
        uses: actions/download-artifact@v6
        with:
          pattern: translation__*
          merge-multiple: false

      - name: Place translation artifacts
        if: needs.translate-and-review.result == 'success'
        run: |
          for dir in translation__*/; do
            [ -d "$dir" ] || continue
            name="${dir%/}"
            talk_id="${name#translation__}"
            for f in transcript_uk.txt review_report.md; do
              src=$(find "$dir" -name "$f" -type f | head -1)
              if [ -n "$src" ]; then
                cp "$src" "talks/$talk_id/$f"
              fi
            done
          done

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt

      - name: Prepare chunks
        id: prepare
        run: |
          TALK_ID="${{ inputs.talk_id }}"
          TALK="talks/$TALK_ID"

          # Find first (longest) video
          FIRST_VIDEO=$(python3 -c "
          import json, yaml
          with open('$TALK/meta.yaml') as f:
            meta = yaml.safe_load(f)
          best_slug, best_dur = None, 0
          for v in meta['videos']:
            wpath = f'$TALK/{v[\"slug\"]}/source/whisper.json'
            try:
              with open(wpath) as wf:
                segs = json.load(wf)['segments']
              dur = segs[-1]['end'] if segs else 0
            except: dur = 0
            if dur > best_dur:
              best_dur = dur
              best_slug = v['slug']
          print(best_slug)
          ")

          echo "talk_id=$TALK_ID" >> "$GITHUB_OUTPUT"
          echo "video_slug=$FIRST_VIDEO" >> "$GITHUB_OUTPUT"

          # Run prepare
          python -m tools.build_map prepare \
            --talk-dir "$TALK" \
            --video-slug "$FIRST_VIDEO" \
            --timing-source "${{ inputs.timing_source || 'whisper' }}" > /tmp/matrix_raw.json

          echo "chunk_matrix=$(cat /tmp/matrix_raw.json)" >> "$GITHUB_OUTPUT"

      - name: Upload chunk files
        uses: actions/upload-artifact@v6
        with:
          name: chunks__${{ inputs.talk_id }}
          path: |
            talks/${{ inputs.talk_id }}/*/work/chunk_*.txt
            talks/${{ inputs.talk_id }}/*/work/uk_blocks.json
            talks/${{ inputs.talk_id }}/*/work/build_meta.json

  # Phase 2a: EN-SRT mode — single agent session (no chunks)
  build-en-srt:
    needs: prepare-build
    if: ${{ !cancelled() && needs.prepare-build.result == 'success' && (inputs.timing_source == 'en-srt') }}
    environment: main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: git pull --rebase

      - name: Download translation artifacts
        if: needs.translate-and-review.result == 'success'
        continue-on-error: true
        uses: actions/download-artifact@v6
        with:
          pattern: translation__*
          merge-multiple: false

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt

      - name: Prepare UK blocks
        run: |
          TALK="talks/${{ needs.prepare-build.outputs.talk_id }}"
          VIDEO="${{ needs.prepare-build.outputs.video_slug }}"
          mkdir -p "$TALK/$VIDEO/work"
          python -m tools.build_map prepare \
            --talk-dir "$TALK" \
            --video-slug "$VIDEO" \
            --timing-source en-srt > /dev/null

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Cache Claude Code
        uses: actions/cache@v5
        with:
          path: |
            ~/.claude-code
            ~/.local/share/claude-code
          key: claude-code-${{ runner.os }}
      - name: Install Claude Code
        run: bun install -g @anthropic-ai/claude-code@latest
      - name: Resolve executable paths
        id: tools
        run: |
          echo "bun=$(which bun)" >> "$GITHUB_OUTPUT"
          echo "claude=$(which claude)" >> "$GITHUB_OUTPUT"

      - name: Build subtitles from EN SRT
        uses: anthropics/claude-code-action@v1
        env:
          CLAUDE_CODE_MAX_OUTPUT_TOKENS: "64000"
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          path_to_bun_executable: ${{ steps.tools.outputs.bun }}
          path_to_claude_code_executable: ${{ steps.tools.outputs.claude }}
          claude_args: "--max-turns 40 --dangerously-skip-permissions --model claude-sonnet-4-6"
          show_full_output: true
          prompt: |
            You have English subtitles with timecodes and Ukrainian subtitle blocks
            that translate the same speech. For each Ukrainian block, find the English
            subtitle(s) with the same meaning and assign their timecodes.

            TALK: talks/${{ needs.prepare-build.outputs.talk_id }}
            VIDEO: ${{ needs.prepare-build.outputs.video_slug }}

            Step 1 — Read inputs:
            - EN SRT: talks/${{ needs.prepare-build.outputs.talk_id }}/${{ needs.prepare-build.outputs.video_slug }}/source/en.srt
            - UK blocks: talks/${{ needs.prepare-build.outputs.talk_id }}/${{ needs.prepare-build.outputs.video_slug }}/work/uk_blocks.json

            Step 2 — For each UK block, find the EN SRT block(s) with the same meaning:
            - If one UK block = one EN SRT block → copy start and end timecodes
            - If one UK block covers multiple EN SRT blocks → use start of first, end of last
            - If multiple UK blocks map to one EN SRT block → split its time range

            Step 3 — Write all timecodes to:
            talks/${{ needs.prepare-build.outputs.talk_id }}/${{ needs.prepare-build.outputs.video_slug }}/work/uk.map

            Format: block_id | start_timecode | end_timecode | text
            Example: 1 | 00:00:01,000 | 00:00:05,000 | Перший блок субтитрів.

            The text column must come from uk_blocks.json — copy exactly, do not modify.
            Write in chunks of ~200 lines using bash cat with heredoc and append (>>).
            Every UK block must have a timecode. Do not skip any blocks.
            Do not use TodoWrite.

      - name: Build SRT from mapping
        run: |
          TALK="talks/${{ needs.prepare-build.outputs.talk_id }}"
          VIDEO="${{ needs.prepare-build.outputs.video_slug }}"
          mkdir -p "$TALK/$VIDEO/final"
          python -m tools.build_srt \
            --mapping "$TALK/$VIDEO/work/uk.map" \
            --output "$TALK/$VIDEO/final/uk.srt" \
            --report "$TALK/$VIDEO/final/build_report.txt"

      - name: Upload build artifacts
        if: "!cancelled()"
        uses: actions/upload-artifact@v6
        with:
          name: subtitles__${{ needs.prepare-build.outputs.talk_id }}
          path: |
            talks/${{ needs.prepare-build.outputs.talk_id }}/*/work/uk.map
            talks/${{ needs.prepare-build.outputs.talk_id }}/*/final/uk.srt
            talks/${{ needs.prepare-build.outputs.talk_id }}/*/final/report.txt
            talks/${{ needs.prepare-build.outputs.talk_id }}/*/final/build_report.txt

  # Phase 2b: Whisper mode — parallel matrix chunks
  build-chunks:
    needs: prepare-build
    if: ${{ !cancelled() && needs.prepare-build.result == 'success' && (inputs.timing_source != 'en-srt') }}
    environment: main
    strategy:
      matrix: ${{ fromJson(needs.prepare-build.outputs.chunk_matrix) }}
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download chunk files
        uses: actions/download-artifact@v6
        with:
          name: chunks__${{ needs.prepare-build.outputs.talk_id }}
          path: talks/${{ needs.prepare-build.outputs.talk_id }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Claude Code
        uses: actions/cache@v5
        with:
          path: |
            ~/.claude-code
            ~/.local/share/claude-code
          key: claude-code-${{ runner.os }}

      - name: Install Claude Code
        run: bun install -g @anthropic-ai/claude-code@latest

      - name: Resolve executable paths
        id: tools
        run: |
          echo "bun=$(which bun)" >> "$GITHUB_OUTPUT"
          echo "claude=$(which claude)" >> "$GITHUB_OUTPUT"

      - name: Determine timecodes for chunk ${{ matrix.ci }}
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          path_to_bun_executable: ${{ steps.tools.outputs.bun }}
          path_to_claude_code_executable: ${{ steps.tools.outputs.claude }}
          claude_args: "--max-turns 10 --dangerously-skip-permissions --model claude-sonnet-4-6"
          show_full_output: true
          prompt: |
            Read the file talks/${{ needs.prepare-build.outputs.talk_id }}/${{ needs.prepare-build.outputs.video_slug }}/work/chunk_${{ matrix.ci }}.txt

            It contains Ukrainian subtitle blocks, English transcript, and whisper timing data.
            Follow the instructions in the file to determine timecodes for each block.

            Write your output to:
            talks/${{ needs.prepare-build.outputs.talk_id }}/${{ needs.prepare-build.outputs.video_slug }}/work/chunk_${{ matrix.ci }}_result.txt

            The output file must contain ONLY lines in this format:
            #<number> | <start HH:MM:SS,mmm> | <end HH:MM:SS,mmm>

            Do not write anything else. Do not use TodoWrite.

      - name: Upload chunk result
        if: "!cancelled()"
        uses: actions/upload-artifact@v6
        with:
          name: chunk_result__${{ needs.prepare-build.outputs.talk_id }}__${{ matrix.ci }}
          path: |
            talks/${{ needs.prepare-build.outputs.talk_id }}/${{ needs.prepare-build.outputs.video_slug }}/work/chunk_${{ matrix.ci }}_result.txt

  # Phase 3: Assemble mapping, build SRT, validate, handle multi-video
  assemble-build:
    needs: [prepare-build, build-chunks]
    if: |
      !cancelled() && needs.prepare-build.result == 'success' &&
      needs.build-chunks.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: git pull --rebase

      - name: Download chunk files
        uses: actions/download-artifact@v6
        with:
          name: chunks__${{ needs.prepare-build.outputs.talk_id }}
          path: talks/${{ needs.prepare-build.outputs.talk_id }}

      - name: Download chunk results
        uses: actions/download-artifact@v6
        with:
          pattern: chunk_result__${{ needs.prepare-build.outputs.talk_id }}__*
          merge-multiple: true
          path: talks/${{ needs.prepare-build.outputs.talk_id }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt

      - name: Place chunk results into work dir
        run: |
          TALK="talks/${{ needs.prepare-build.outputs.talk_id }}"
          VIDEO="${{ needs.prepare-build.outputs.video_slug }}"
          WORK="$TALK/$VIDEO/work"
          mkdir -p "$WORK"
          # Move result files from talk root to work dir (LCA stripping)
          for f in "$TALK"/chunk_*_result.txt; do
            [ -f "$f" ] && mv "$f" "$WORK/" && echo "Placed: $(basename $f)"
          done
          echo "Work dir:"
          ls "$WORK"/chunk_*_result.txt 2>/dev/null | wc -l
          echo "result files"

      - name: Assemble mapping and build SRT
        run: |
          TALK="talks/${{ needs.prepare-build.outputs.talk_id }}"
          VIDEO="${{ needs.prepare-build.outputs.video_slug }}"
          python -m tools.build_map assemble --talk-dir "$TALK" --video-slug "$VIDEO"

      - name: Handle offset videos
        run: |
          TALK="talks/${{ needs.prepare-build.outputs.talk_id }}"
          FIRST="${{ needs.prepare-build.outputs.video_slug }}"

          python3 -c "
          import yaml
          with open('$TALK/meta.yaml') as f:
            meta = yaml.safe_load(f)
          for v in meta['videos']:
            if v['slug'] != '$FIRST':
              print(v['slug'])
          " | while read slug; do
            echo "=== Offset video: $slug ==="
            python -m tools.offset_srt detect \
              --srt1 "$TALK/$FIRST/source/en.srt" \
              --srt2 "$TALK/$slug/source/en.srt" || true

            OFFSET=$(python -m tools.offset_srt detect \
              --srt1 "$TALK/$FIRST/source/en.srt" \
              --srt2 "$TALK/$slug/source/en.srt" 2>/dev/null | grep -oP '[-\d]+' | head -1)

            if [ -n "$OFFSET" ]; then
              mkdir -p "$TALK/$slug/final"
              python -m tools.offset_srt apply \
                --srt "$TALK/$FIRST/final/uk.srt" \
                --offset-ms "$OFFSET" \
                --output "$TALK/$slug/final/uk.srt"
            fi
          done

      - name: Validate
        run: |
          TALK="talks/${{ needs.prepare-build.outputs.talk_id }}"
          FIRST="${{ needs.prepare-build.outputs.video_slug }}"

          python3 -c "
          import yaml
          with open('$TALK/meta.yaml') as f:
            meta = yaml.safe_load(f)
          for v in meta['videos']:
            print(v['slug'])
          " | while read slug; do
            VIDEO="$TALK/$slug"
            EXTRA_FLAGS=""
            if [ "$slug" != "$FIRST" ]; then
              EXTRA_FLAGS="--skip-text-check --skip-time-check"
            fi
            python -m tools.validate_subtitles \
              --srt "$VIDEO/final/uk.srt" \
              --transcript "$TALK/transcript_uk.txt" \
              --whisper-json "$VIDEO/source/whisper.json" \
              --skip-duration-check \
              $EXTRA_FLAGS \
              --report "$VIDEO/final/report.txt"
          done

      - name: Upload build artifacts
        if: "!cancelled()"
        uses: actions/upload-artifact@v6
        with:
          name: subtitles__${{ needs.prepare-build.outputs.talk_id }}
          path: |
            talks/${{ needs.prepare-build.outputs.talk_id }}/*/work/uk.map
            talks/${{ needs.prepare-build.outputs.talk_id }}/*/final/uk.srt
            talks/${{ needs.prepare-build.outputs.talk_id }}/*/final/report.txt
            talks/${{ needs.prepare-build.outputs.talk_id }}/*/final/build_report.txt

  # Deploy subtitle preview to GitHub Pages
  preview-deploy:
    needs: [commit]
    if: ${{ !cancelled() && inputs.preview != false }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: git pull --rebase

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt

      - name: Generate full preview site
        run: |
          python -m tools.generate_preview \
            --output-dir /tmp/preview \
            --base-url "/sy-subtitles"

      - name: Deploy to gh-pages
        run: |
          git fetch origin gh-pages
          git worktree add /tmp/gh-pages gh-pages
          # Replace entire site with fresh generation
          find /tmp/gh-pages -maxdepth 1 -not -name '.git' -not -name '.gitignore' -not -path /tmp/gh-pages -exec rm -rf {} +
          cp -r /tmp/preview/* /tmp/gh-pages/
          cd /tmp/gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && { echo "No preview changes"; exit 0; }
          git commit -m "Update preview site"
          git push

      - name: Summary
        if: always()
        run: |
          TALK_ID="${{ inputs.talk_id }}"
          BASE="https://slavasubotskiy.github.io/sy-subtitles"
          echo "## 🎬 Subtitle Preview" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -d "/tmp/preview/$TALK_ID" ]; then
            for vdir in /tmp/preview/$TALK_ID/*/; do
              [ -d "$vdir" ] || continue
              SLUG=$(basename "$vdir")
              echo "- [$SLUG]($BASE/$TALK_ID/$SLUG/)" >> "$GITHUB_STEP_SUMMARY"
            done
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "📋 [All previews]($BASE/)" >> "$GITHUB_STEP_SUMMARY"

  # Single commit job – collects all artifacts and pushes
  commit:
    needs: [translate-and-review, assemble-build, build-en-srt]
    # commit runs after any build path completes
    if: |
      always() &&
      !cancelled() &&
      (needs.assemble-build.result == 'success' || needs.assemble-build.result == 'failure' || needs.assemble-build.result == 'skipped') &&
      (needs.translate-and-review.result == 'success' || needs.translate-and-review.result == 'failure' || needs.translate-and-review.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Pull latest
        run: git pull --rebase

      - name: Download translation artifacts
        if: needs.translate-and-review.result == 'success' || needs.translate-and-review.result == 'failure'
        uses: actions/download-artifact@v6
        with:
          pattern: translation__*
          path: /tmp/translation

      - name: Download subtitle artifacts
        if: needs.assemble-build.result == 'success' || needs.assemble-build.result == 'failure'
        uses: actions/download-artifact@v6
        with:
          pattern: subtitles__*
          path: /tmp/subtitles

      - name: Place artifacts into talk directories
        run: |
          TALK_ID="${{ inputs.talk_id }}"

          # Translation
          if [ -d /tmp/translation ]; then
            echo "=== Translation artifacts ==="
            find /tmp/translation -type f
            for f in transcript_uk.txt review_report.md; do
              src=$(find /tmp/translation -name "$f" -type f | head -1)
              if [ -n "$src" ]; then
                cp "$src" "talks/$TALK_ID/$f"
                echo "  -> talks/$TALK_ID/$f"
              fi
            done
          fi

          # Subtitles
          if [ -d /tmp/subtitles ]; then
            echo "=== Subtitle artifacts ==="
            find /tmp/subtitles -type f
            find /tmp/subtitles \( -name "uk.srt" -o -name "uk.map" -o -name "report.txt" -o -name "build_report.txt" \) | while read src; do
              # Preserve video slug subdirectory
              rel=$(echo "$src" | grep -o '[^/]*/\(work\|final\)/[^/]*$')
              if [ -n "$rel" ]; then
                dest="talks/$TALK_ID/$rel"
                mkdir -p "$(dirname "$dest")"
                cp "$src" "$dest"
                echo "  -> $dest"
              fi
            done
          fi

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add talks/*/transcript_uk.txt talks/*/review_report.md \
                talks/*/*/work/uk.map \
                talks/*/*/final/uk.srt talks/*/*/final/report.txt \
                talks/*/*/final/build_report.txt
          git diff --cached --quiet && { echo "No changes to commit"; exit 0; }
          git commit -m "Build subtitles (full pipeline)"
          git pull --rebase
          git push
