name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Stamp build info
        run: |
          DEPLOY_DATE=$(date -u +%Y-%m-%d)
          # Blob SHA of site/index.html as it is in git (before sed)
          # This matches what Trees API returns — used for auto-reload detection
          BLOB_SHA=$(git hash-object site/index.html | head -c 7)
          sed -i "s/var APP_DEPLOY_DATE = '';/var APP_DEPLOY_DATE = '${DEPLOY_DATE}';/" site/index.html
          sed -i "s/var APP_DEPLOY_SHA = '';/var APP_DEPLOY_SHA = '${BLOB_SHA}';/" site/index.html
          echo "Deploy: date=$DEPLOY_DATE sha=$BLOB_SHA"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v5
